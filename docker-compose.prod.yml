services:
  app:
    build:
      context: .
      target: prod
    image: ${APP_IMAGE:-ticket-reservation-api}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SQLITE_PATH=/app/data/ticket-reservation.sqlite
      - REDIS_URL=redis://redis:6379
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    ports:
      - "80:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt

volumes:
  app_data:
  redis_data:
