services:
  app:
    build:
      context: .
      target: dev

    env_file:
      - .env

    command: sh -c "if [ ! -d node_modules/ts-node ] || [ ! -d node_modules/tsx ] || [ ! -f node_modules/.package-lock.json ]; then npm ci; fi && npm run dev:docker"

    ports:
      - "4000:4000"

    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - data:/app/data

volumes:
  node_modules:
  data: