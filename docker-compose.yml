services:
  app:
    build:
      context: .
      target: dev

    env_file:
      - .env

    environment:
      - REDIS_URL=redis://redis:6379

    command: sh -c "if [ ! -d node_modules/ts-node ] || [ ! -d node_modules/tsx ] || [ ! -d node_modules/pino ] || [ ! -d node_modules/pino-http ] || [ ! -f node_modules/.package-lock.json ]; then npm ci; fi && npm run dev:docker"

    ports:
      - "4000:4000"

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  node_modules:
  data:
